name: Gerar Release Automático

on:
  push:
    tags:
      - 'v*' # Dispara ao criar tags como v0.3.1

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Preparar Pacote do Plugin
        run: |
          # 1. Define o nome técnico da pasta (exigido pelo QGIS)
          PLUGIN_NAME="vector_to_map"
          mkdir "$PLUGIN_NAME"
          
          # 2. Copia arquivos e a pasta i18n (essencial para v0.3.1)
          cp -r __init__.py vector_to_map.py vector_to_map_dialog.py \
                vector_to_map_dialog_base.ui metadata.txt icon.png \
                resources.py LICENSE README.md i18n/ "$PLUGIN_NAME/"
          
          # 3. Limpeza: Remove arquivos de tradução fonte (.ts), mantém apenas os compilados (.qm)
          find "$PLUGIN_NAME/i18n" -name "*.ts" -type f -delete
          
          # 4. Gera o ZIP final
          zip -r "${PLUGIN_NAME}.zip" "$PLUGIN_NAME"

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: vector_to_map.zip
          name: Release ${{ github.ref_name }}
          body: |
            ### 🗺️ VectorToMap ${{ github.ref_name }}
            Nova versão gerada automaticamente via GitHub Actions.
            
            **Destaques desta versão:**
            * Implementação de Barras de Progresso em tempo real.
            * Novo sistema de interrupção (Abort) de processamento.
            * Suporte multilíngue completo (PT, EN, ES).
            * Escala fixa de 1:10.000 otimizada para engenharia.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}